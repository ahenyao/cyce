name: Android Debug Build

on:
  push:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Verify SDK
        run: dotnet --info

      - name: Install Android workload
        run: |
          dotnet workload install android
          dotnet workload restore

      - name: Restore
        run: dotnet restore ZdaszToApp/ZdaszToApp.Android/ZdaszToApp.Android.csproj

      - name: Build Debug APK (ARM64)
        run: |
          dotnet publish \
            -c Debug \
            -f net9.0-android \
            -r android-arm64 \
            ZdaszToApp/ZdaszToApp.Android/ZdaszToApp.Android.csproj \
            /p:AndroidPackageFormat=apk \
            /p:RunAOTCompilation=false \
            /p:PublishTrimmed=false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: ZdaszToApp/ZdaszToApp.Android/bin/Debug/net9.0-android/android-arm64/publish/*.apk
