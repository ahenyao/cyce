name: iOS Build

on:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest
    env:
      IOS_CERT_P12: ${{ secrets.IOS_CERT_P12 }}
      IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
      IOS_CODESIGN_KEY: ${{ secrets.IOS_CODESIGN_KEY }}
      IOS_PROVISION: ${{ secrets.IOS_PROVISION }}
      IOS_PROVISION_UUID: ${{ secrets.IOS_PROVISION_UUID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install iOS workload
        run: dotnet workload install ios

      - name: Decode certificate
        run: echo "$IOS_CERT_P12" | base64 --decode > cert.p12

      - name: Create temporary keychain and import certificate
        run: |
          security create-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$IOS_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

      - name: Decode provisioning profile
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$IOS_PROVISION" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/$IOS_PROVISION_UUID.mobileprovision"

      - name: Restore iOS project
        run: dotnet restore ZdaszToApp/ZdaszToApp.iOS/ZdaszToApp.iOS.csproj

      - name: Publish iOS device
        run: |
          dotnet publish -c Debug \
            -f net8.0-ios \
            -r ios-arm64 \
            ZdaszToApp/ZdaszToApp.iOS/ZdaszToApp.iOS.csproj \
            --no-restore \
            /p:EnableCodeSigning=false \
            /p:CodesignKey="" \
            /p:CodesignProvision="" \
            /p:CodesignEntitlements="" \
            /p:MtouchLink=None

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ios-arm64-release
          path: ZdaszToApp/ZdaszToApp.iOS/bin/Debug/net9.0-ios/ipa/ZdaszToApp.iOS.ipa
