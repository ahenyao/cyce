name: iOS Build

on:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install iOS workload
        run: dotnet workload install ios

      - name: Decode provisioning profile
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/${{ secrets.IOS_PROVISIONING_UUID }}.mobileprovision"
          chmod 644 "$HOME/Library/MobileDevice/Provisioning Profiles/${{ secrets.IOS_PROVISIONING_UUID }}.mobileprovision"

      - name: Import certificate
        run: |
          echo "${{ secrets.IOS_CODESIGN_KEY }}" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "${{ secrets.IOS_CERT_PASSWORD }}" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings build.keychain

      - name: Restore project
        run: dotnet restore ZdaszToApp/ZdaszToApp.iOS/ZdaszToApp.iOS.csproj

      - name: Publish iOS ARM64
        run: |
          dotnet publish -c Release \
            -f net8.0-ios17.0 \
            -r ios-arm64 \
            ZdaszToApp/ZdaszToApp.iOS/ZdaszToApp.iOS.csproj \
            /p:CodesignKey="${{ secrets.IOS_CODESIGN_NAME }}" \
            /p:CodesignProvision="$HOME/Library/MobileDevice/Provisioning Profiles/${{ secrets.IOS_PROVISIONING_UUID }}.mobileprovision"
